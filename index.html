<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أنسام للخدمات العقارية - مساعد صوتي</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      margin: 0;
      padding: 20px;
      text-align: center;
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 40px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 28px;
      color: #1a3c5e;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #555;
      margin: 15px 0;
    }
    .highlight {
      color: #0d6efd;
      font-weight: bold;
    }
    .demo-box {
      margin: 40px 0;
      padding: 30px;
      background: #f8f9fa;
      border-radius: 15px;
      border: 2px dashed #0d6efd;
    }
    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>مكتب أنسام للخدمات العقارية</h1>
    <p>جرب مساعدنا العقاري الصوتي الذكي الآن</p>
    
    <div class="demo-box">
      <p><strong>اضغط على زر الميكروفون أدناه</strong><br>
      وتكلم بالعامية السعودية</p>
      
      <!-- هنا ضع كود الـ Widget من ElevenLabs -->

    <p class="highlight">جرب الآن، مثلاً قل:</p>
    <p>"كم إيجار شقة غرفتين في حطين؟"<br>
       أو "تبغون تديرون لي فيلاي؟"</p>

    <footer>
      © أنسام للخدمات العقارية - تجربة تجريبية
    </footer>
  </div>

</html>
